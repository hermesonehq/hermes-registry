name: Validate

# Validate every entry on PRs and on pushes to feature branches. Pushes to main
# are validated by the Build Index workflow instead, so we skip main here to
# avoid a duplicate run. Fails the check on any ERROR; warnings are allowed.
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate registry
        run: python scripts/validate.py
